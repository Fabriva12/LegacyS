# Render Configuration
# https://render.com/docs/blueprint-spec
#
# Web Service con serve -s para SPA routing.
# serve -s redirige toda ruta no encontrada a index.html
# permitiendo que React Router maneje la navegación del lado del cliente.

services:
  - type: web
    name: legacysport
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: serve -s dist -l $PORT
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false
