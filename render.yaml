# Render Configuration
# https://render.com/docs/blueprint-spec
#
# Este archivo define el servicio como Static Site para SPA.
# Las rutas se redirigen a index.html para que React Router las maneje.
# No necesita un servidor Node corriendo — Render sirve los archivos directo del CDN.

services:
  - type: static_site
    name: legacysport
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false
